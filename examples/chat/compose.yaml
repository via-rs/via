services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: chat
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: drowssap
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

volumes:
  postgres:
